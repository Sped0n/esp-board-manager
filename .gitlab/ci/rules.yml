.rules:pre_check:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.rules:build:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH'

.rules:deploy:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: never
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH =~ /^release\/v/'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+(\.\d+)?($|-)/'

##############
# if anchors #
##############
.if-protected-docs: &if-protected-docs
  if: '($CI_COMMIT_REF_NAME == "main" || $CI_COMMIT_BRANCH =~ /^release\/v/ || $CI_COMMIT_TAG =~ /^v\d+\.\d+(\.\d+)?($|-)/)'

.if-merge_request_event-docs: &if-merge_request_event-docs
  if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

.if-label-build_docs: &if-label-build_docs
  if: '$BOT_LABEL_BUILD_DOCS || $CI_MERGE_REQUEST_LABELS =~ /^(?:[^,\n\r]+,)*build_docs(?:,[^,\n\r]+)*$/i'

.if-schedule-docs: &if-schedule-docs
  if: '$CI_PIPELINE_SOURCE == "schedule"'

# Build documentation on:
#   - protected branches / release tags;
#   - merge request events (so MR pipelines always exercise the docs build);
#   - any pipeline carrying the `build_docs` label.
# Schedules are explicitly skipped; docs are validated by MR pipelines.
.rules:build:docs:
  rules:
    - <<: *if-schedule-docs
      when: never
    - <<: *if-protected-docs
    - <<: *if-merge_request_event-docs
    - <<: *if-label-build_docs

# Deploy docs preview on MR events; deploy docs production on protected branches / tags.
.rules:deploy:docs:preview:
  rules:
    - <<: *if-merge_request_event-docs

.rules:deploy:docs:production:
  rules:
    - <<: *if-protected-docs
